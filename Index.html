<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b9d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🎂 Happy Birthday Soumili! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #ff6b9d;
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .music-player {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .music-player audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .decorations {
            position: relative;
            height: 300px;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 0;
            animation: float 3s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .balloon:hover {
            transform: scale(1.1);
        }

        .balloon1 {
            background: #ff6b6b;
            left: 10%;
            animation-delay: 0s;
        }

        .balloon2 {
            background: #4ecdc4;
            left: 30%;
            animation-delay: 0.5s;
        }

        .balloon3 {
            background: #ffe66d;
            left: 50%;
            animation-delay: 1s;
        }

        .balloon4 {
            background: #a8d8ea;
            left: 70%;
            animation-delay: 1.5s;
        }

        .balloon5 {
            background: #ff6b9d;
            left: 90%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% {
                bottom: 0;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                bottom: 150%;
                opacity: 0;
            }
        }

        .balloon.popped {
            animation: pop 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            pointer-events: none;
        }

        .balloon-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 1000;
            text-align: center;
            animation: popupSlide 0.5s ease-out;
            max-width: 80%;
        }

        @keyframes popupSlide {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .balloon-popup.show {
            display: block;
        }

        .balloon-message {
            font-size: 1.3em;
            color: #ff6b9d;
            font-weight: bold;
            line-height: 1.8;
            margin: 20px 0;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .popup-overlay.show {
            display: block;
        }

        .cake {
            margin: 40px 0;
        }

        .cake-emoji {
            font-size: 5em;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .candles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .candle {
            width: 8px;
            height: 40px;
            background: #ffeb3b;
            border-radius: 4px;
            position: relative;
        }

        .flame {
            width: 6px;
            height: 15px;
            background: #ff6b6b;
            border-radius: 50%;
            position: absolute;
            top: -8px;
            left: 1px;
            animation: flicker 0.3s infinite;
        }

        @keyframes flicker {
            0%, 100% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(0.8); opacity: 0.8; }
        }

        .gift-box {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            background: #ff6b9d;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .gift-box.opened {
            background: #fff9e6;
            border: 3px dashed #ff6b9d;
        }

        .ribbon {
            width: 100%;
            height: 20px;
            background: #ff1493;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .ribbon-v {
            width: 20px;
            height: 100%;
            background: #ff1493;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .gift-emoji {
            font-size: 4em;
            z-index: 2;
        }

        .photo-frame {
            background: white;
            border: 5px solid #ff6b9d;
            border-radius: 15px;
            max-width: 300px;
            margin: 20px auto;
            padding: 10px;
            display: none;
        }

        .photo-frame.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .back-btn {
            background: #999;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: #777;
        }

        .message {
            font-size: 1.1em;
            color: #ff6b9d;
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.8;
        }

        .close-popup {
            background: #999;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
        }

        .close-popup:hover {
            background: #777;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .menu {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="menu" class="content active">
            <h1>🎉 Happy Birthday Soumili! 🎉</h1>
            <p class="subtitle">Click any option to explore!</p>
            
            <div class="menu">
                <button class="menu-btn" onclick="showContent('music')">🎵 Music</button>
                <button class="menu-btn" onclick="showContent('decorations')">🎈 Decorations</button>
                <button class="menu-btn" onclick="showContent('cake')">🎂 Cake</button>
                <button class="menu-btn" onclick="showContent('gift')">🎁 Gift</button>
            </div>

            <p class="message">✨ Made with love, just for you! ✨</p>
